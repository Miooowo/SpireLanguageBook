<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>杀戮尖塔 · 描述学</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="bg-texture"></div>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">⚔</span>
        <div>
          <h1>杀戮尖塔 · 描述学</h1>
          <p class="subtitle">Spire Language Book — 官方描述范例与标记语法参考</p>
        </div>
      </div>
      <nav class="main-nav" id="mainNav">
        <a class="nav-btn nav-link" href="guide.html">规范指南</a>
        <button class="nav-btn active" data-view="browse">范例浏览</button>
        <button class="nav-btn" data-view="syntax">语法参考</button>
        <button class="nav-btn" data-view="stats">统计分析</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <!-- Browse View -->
    <section id="browseView" class="view active">
      <div class="toolbar">
        <div class="search-box">
          <input type="search" id="searchInput" placeholder="搜索名称、ID 或描述文本…" autocomplete="off">
        </div>
        <div class="toolbar-row">
          <div class="category-nav" id="categoryNav"></div>
          <div class="filters">
            <label class="filter-toggle">
              <input type="checkbox" id="showRawToggle">
              <span>显示标记</span>
            </label>
            <select id="fieldFilter">
              <option value="all">全部字段</option>
            </select>
            <select id="syntaxFilter">
              <option value="">语法筛选</option>
            </select>
          </div>
        </div>
      </div>
      <div class="results-meta">
        <span id="resultsCount">加载中…</span>
      </div>
      <div class="entry-grid" id="entryGrid"></div>
      <div class="pagination" id="pagination"></div>
    </section>

    <!-- Syntax Reference View -->
    <section id="syntaxView" class="view">
      <div class="syntax-intro card-panel">
        <h2>描述标记语法概览</h2>
        <p>杀戮尖塔采用一套富文本标记语言来书写卡牌、遗物等描述。本页收录官方范例，供撰写与查阅时对照；撰写规范见<a href="guide.html" style="color:var(--gold)">规范指南</a>。</p>
      </div>
      <div class="syntax-grid" id="syntaxGrid"></div>
    </section>

    <!-- Stats View -->
    <section id="statsView" class="view">
      <div class="stats-grid" id="statsGrid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>数据来源：官方游戏描述范例（zhs/）· <a href="guide.html" style="color:var(--gold-dim)">撰写规范指南</a></p>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
